; Runtime PHP — ambiente Docker local (Windows bind mount)
memory_limit = 256M
max_execution_time = 120
post_max_size = 32M
upload_max_filesize = 32M

date.timezone = America/Sao_Paulo

; Reduz stat() em paths montados via volume (Windows)
realpath_cache_size = 4096K
realpath_cache_ttl = 600

error_reporting = E_ALL & ~E_DEPRECATED
display_errors = Off
log_errors = On
expose_php = Off
