[www]
; Pool dinamico — evita "server reached pm.max_children" em navegacao Livewire
pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests = 500
pm.process_idle_timeout = 10s

request_terminate_timeout = 120s
request_slowlog_timeout = 5s
slowlog = /proc/self/fd/2

; Preserva variaveis do docker-compose / .env
clear_env = no

; Evita log ruidoso em healthcheck
access.log = /proc/self/fd/2
